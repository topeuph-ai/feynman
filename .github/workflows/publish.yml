name: Publish and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  version-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_publish: ${{ steps.version.outputs.should_publish }}
      should_build_release: ${{ steps.version.outputs.should_build_release }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 24.14.0
      - id: version
        shell: bash
        run: |
          CURRENT=$(npm view @companion-ai/feynman version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -p "require('./package.json').version")
          echo "version=$LOCAL" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$LOCAL" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "should_build_release=true" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "should_build_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "should_build_release=false" >> "$GITHUB_OUTPUT"
          fi

  publish-npm:
    needs: version-check
    if: needs.version-check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 24.14.0
          registry-url: https://registry.npmjs.org
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm test
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-native-bundles:
    needs: version-check
    if: needs.version-check.outputs.should_build_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64
            os: ubuntu-latest
            smoke_shell: bash
            smoke_command: |
              VERSION=$(node -p "require('./package.json').version")
              tmp=$(mktemp -d)
              tar -xzf "dist/release/feynman-${VERSION}-linux-x64.tar.gz" -C "$tmp"
              "$tmp/feynman-${VERSION}-linux-x64/feynman" --help >/tmp/feynman-help.out
              head -20 /tmp/feynman-help.out
          - id: darwin-x64
            os: macos-15-intel
            smoke_shell: bash
            smoke_command: |
              VERSION=$(node -p "require('./package.json').version")
              tmp=$(mktemp -d)
              tar -xzf "dist/release/feynman-${VERSION}-darwin-x64.tar.gz" -C "$tmp"
              "$tmp/feynman-${VERSION}-darwin-x64/feynman" --help >/tmp/feynman-help.out
              head -20 /tmp/feynman-help.out
          - id: darwin-arm64
            os: macos-14
            smoke_shell: bash
            smoke_command: |
              VERSION=$(node -p "require('./package.json').version")
              tmp=$(mktemp -d)
              tar -xzf "dist/release/feynman-${VERSION}-darwin-arm64.tar.gz" -C "$tmp"
              "$tmp/feynman-${VERSION}-darwin-arm64/feynman" --help >/tmp/feynman-help.out
              head -20 /tmp/feynman-help.out
          - id: win32-x64
            os: windows-latest
            smoke_shell: pwsh
            smoke_command: |
              $version = node -p "require('./package.json').version"
              $tmp = Join-Path $env:RUNNER_TEMP ("feynman-smoke-" + [guid]::NewGuid().ToString("N"))
              New-Item -ItemType Directory -Path $tmp | Out-Null
              Expand-Archive -LiteralPath "dist/release/feynman-$version-win32-x64.zip" -DestinationPath $tmp -Force
              & "$tmp/feynman-$version-win32-x64/feynman.cmd" --help | Select-Object -First 20
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 24.14.0
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm run build:native-bundle
      - name: Smoke native bundle
        shell: ${{ matrix.smoke_shell }}
        run: ${{ matrix.smoke_command }}
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.id }}
          path: dist/release/*

  release-github:
    needs:
      - version-check
      - publish-npm
      - build-native-bundles
    if: needs.version-check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version-check.outputs.version }}
        run: |
          gh release create "v$VERSION" release-assets/* \
            --title "v$VERSION" \
            --notes "Standalone Feynman bundles for native installation." \
            --target "$GITHUB_SHA"
